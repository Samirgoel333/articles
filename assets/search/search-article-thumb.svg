<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" aria-hidden="true">
  <!-- Storyset-inspired flat city / location search scene -->
  <defs>
    <linearGradient id="sky" x1="128" y1="0" x2="128" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FF"/>
      <stop offset="1" stop-color="#E8F3FF"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" fill="url(#sky)"/>

  <!-- soft blobs -->
  <ellipse cx="52" cy="54" rx="34" ry="22" fill="#E0E7FF" opacity="0.85"/>
  <ellipse cx="210" cy="68" rx="28" ry="18" fill="#DBEAFE" opacity="0.8"/>
  <circle cx="220" cy="34" r="8" fill="#C7D2FE" opacity="0.55"/>
  <circle cx="36" cy="92" r="5" fill="#BFDBFE" opacity="0.55"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.95">
    <ellipse cx="68" cy="42" rx="18" ry="10"/>
    <ellipse cx="82" cy="40" rx="14" ry="9"/>
    <ellipse cx="54" cy="40" rx="12" ry="8"/>
    <ellipse cx="196" cy="52" rx="16" ry="9"/>
    <ellipse cx="208" cy="50" rx="12" ry="8"/>
  </g>

  <!-- ground -->
  <path d="M0 196 C48 184 96 190 128 188 C168 186 208 194 256 188 L256 256 L0 256 Z" fill="#D1FAE5"/>
  <path d="M0 206 C64 198 128 204 256 198 L256 256 L0 256 Z" fill="#A7F3D0" opacity="0.55"/>

  <!-- buildings back row -->
  <rect x="18" y="118" width="34" height="78" rx="4" fill="#93C5FD"/>
  <rect x="58" y="102" width="28" height="94" rx="4" fill="#60A5FA"/>
  <rect x="168" y="108" width="32" height="88" rx="4" fill="#818CF8"/>
  <rect x="206" y="124" width="30" height="72" rx="4" fill="#A5B4FC"/>

  <!-- building windows -->
  <g fill="#FFFFFF" opacity="0.85">
    <rect x="26" y="128" width="6" height="8" rx="1"/>
    <rect x="38" y="128" width="6" height="8" rx="1"/>
    <rect x="26" y="144" width="6" height="8" rx="1"/>
    <rect x="38" y="144" width="6" height="8" rx="1"/>
    <rect x="26" y="160" width="6" height="8" rx="1"/>
    <rect x="38" y="160" width="6" height="8" rx="1"/>
    <rect x="66" y="114" width="5" height="7" rx="1"/>
    <rect x="76" y="114" width="5" height="7" rx="1"/>
    <rect x="66" y="128" width="5" height="7" rx="1"/>
    <rect x="76" y="128" width="5" height="7" rx="1"/>
    <rect x="176" y="120" width="6" height="8" rx="1"/>
    <rect x="188" y="120" width="6" height="8" rx="1"/>
    <rect x="176" y="136" width="6" height="8" rx="1"/>
    <rect x="188" y="136" width="6" height="8" rx="1"/>
    <rect x="214" y="136" width="5" height="7" rx="1"/>
    <rect x="224" y="136" width="5" height="7" rx="1"/>
  </g>

  <!-- landmark building (India Gate inspired arch) -->
  <rect x="98" y="132" width="60" height="64" rx="4" fill="#6366F1"/>
  <path d="M110 164 H146 V196 H110 Z" fill="#4F46E5"/>
  <path d="M118 164 C118 152 138 152 138 164" stroke="#E0E7FF" stroke-width="4" stroke-linecap="round"/>
  <rect x="124" y="168" width="8" height="28" rx="2" fill="#C7D2FE"/>

  <!-- trees -->
  <g>
    <rect x="92" y="178" width="4" height="18" fill="#92400E"/>
    <circle cx="94" cy="172" r="10" fill="#34D399"/>
    <rect x="150" y="180" width="4" height="16" fill="#92400E"/>
    <circle cx="152" cy="174" r="9" fill="#10B981"/>
  </g>

  <!-- floating map card -->
  <rect x="132" y="78" width="92" height="64" rx="10" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
  <path d="M140 118 C152 104 168 104 180 112 C192 120 204 116 212 108" stroke="#93C5FD" stroke-width="3" stroke-linecap="round"/>
  <path d="M140 124 C156 114 172 118 188 126" stroke="#BFDBFE" stroke-width="2" stroke-linecap="round"/>

  <!-- location pin on map -->
  <path d="M176 92 C170 92 166 98 166 104 C166 114 176 126 176 126 C176 126 186 114 186 104 C186 98 182 92 176 92 Z" fill="#7C3AED"/>
  <circle cx="176" cy="104" r="4" fill="#FFFFFF"/>

  <!-- magnifying glass -->
  <circle cx="206" cy="98" r="10" stroke="#3D9B5F" stroke-width="3" fill="#ECFDF5"/>
  <path d="M213 105 L222 114" stroke="#3D9B5F" stroke-width="3" stroke-linecap="round"/>

  <!-- character -->
  <g transform="translate(34 132)">
    <!-- legs -->
    <path d="M18 58 L12 78" stroke="#1E293B" stroke-width="5" stroke-linecap="round"/>
    <path d="M30 58 L36 78" stroke="#1E293B" stroke-width="5" stroke-linecap="round"/>
    <!-- body -->
    <rect x="10" y="34" width="28" height="28" rx="10" fill="#6366F1"/>
    <!-- arm + phone -->
    <path d="M34 42 L48 34" stroke="#FFBE9D" stroke-width="5" stroke-linecap="round"/>
    <rect x="46" y="24" width="16" height="24" rx="4" fill="#1E293B"/>
    <rect x="48" y="27" width="12" height="16" rx="2" fill="#BFDBFE"/>
    <circle cx="54" cy="38" r="2" fill="#7C3AED"/>
    <!-- head -->
    <circle cx="24" cy="22" r="14" fill="#FFBE9D"/>
    <path d="M12 18 C14 8 24 6 32 10 C36 12 38 16 36 20" fill="#1E293B"/>
    <!-- smile -->
    <path d="M18 28 Q24 32 30 28" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- accent sparkles -->
  <path d="M118 72 L120 78 L126 80 L120 82 L118 88 L116 82 L110 80 L116 78 Z" fill="#FBBF24"/>
  <path d="M228 148 L229 152 L233 153 L229 154 L228 158 L227 154 L223 153 L227 152 Z" fill="#F472B6" opacity="0.8"/>
</svg>
